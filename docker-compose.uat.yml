# STORM UAT deployment
#
# Prerequisites:
#   - docker network create rescor-uat
#   - .env in this directory with Infisical bootstrap vars + NODE_AUTH_TOKEN
#
# Build and start:
#   docker compose -f docker-compose.uat.yml build
#   docker compose -f docker-compose.uat.yml up -d

services:

  neo4j:
    image: neo4j:5.15-community
    container_name: storm-neo4j
    ports:
      - "127.0.0.1:17574:7474"
      - "127.0.0.1:17787:7687"
    environment:
      NEO4J_AUTH: neo4j/${STORM_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_apoc_ttl_enabled: "true"
      NEO4J_apoc_ttl_schedule: "60"
    volumes:
      - storm-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${STORM_NEO4J_PASSWORD} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - rescor-uat
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
    container_name: storm-api
    environment:
      - NODE_ENV=production
      - PHASE=uat
      - PORT=3200
    ports:
      - "127.0.0.1:3200:3200"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - rescor-uat
    restart: unless-stopped

volumes:
  storm-neo4j-data:

networks:
  rescor-uat:
    external: true
