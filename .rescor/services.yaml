# STORM API — Project Service Definitions
# Inherits core services from core.rescor.net automatically.
# Override unused inherited services to prevent unnecessary startup.

services:
  # ── Disabled inherited services ────────────────────────────────────
  # STORM only needs infisical + storm-neo4j. Override the rest so the
  # orchestrator skips them instead of wasting time on health checks.
  neo4j:
    type: external
    healthCheck: tcp://localhost:1
    required: false
    startupTimeout: 1000
  db2:
    type: external
    healthCheck: tcp://localhost:1
    required: false
    startupTimeout: 1000
  asr-neo4j:
    type: external
    healthCheck: tcp://localhost:1
    required: false
    startupTimeout: 1000

  # ── STORM services ────────────────────────────────────────────────
  # STORM Neo4j — dedicated graph database for measurement persistence
  storm-neo4j:
    type: docker-compose
    service: neo4j
    composePath: ./docker-compose.yml
    healthCheck: http://localhost:17574
    required: true
    dependsOn: []
    startupTimeout: 45000
    healthCheckInterval: 2000
    env:
      NEO4J_AUTH: neo4j/stormdev123

  # STORM API — Express application
  api:
    type: npm
    script: dev
    cwd: ./
    required: true
    dependsOn: [storm-neo4j, infisical]
    healthCheck: http://localhost:3200/health
    healthCheckInterval: 3000
    startupTimeout: 15000
