# STORM Neo4j — dedicated development instance
# Ports offset to avoid conflict with rescor-neo4j (7474/7687) and asr-neo4j (17474/17687)

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: storm-neo4j
    ports:
      - "17574:7474"   # HTTP browser
      - "17787:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/stormdev123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_apoc_ttl_enabled: "true"
      NEO4J_apoc_ttl_schedule: "60"
    volumes:
      - storm-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p stormdev123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  storm-neo4j-data:
